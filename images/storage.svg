<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="تخزين">
  <!-- Placeholder product art — replace with a real SSD photo later -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1d11"/><stop offset="1" stop-color="#43301b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g stroke="#45321e" stroke-width="1">
    <path d="M0 75h400M0 150h400M0 225h400M100 0v300M200 0v300M300 0v300"/>
  </g>
  <!-- M.2 stick -->
  <g transform="rotate(-14 200 150)">
    <rect x="80" y="128" width="240" height="52" rx="8" fill="#332413" stroke="#8d7a61" stroke-width="2"/>
    <!-- controller + nand chips -->
    <rect x="102" y="140" width="36" height="28" rx="4" fill="none" stroke="#fb923c" stroke-width="2.2"/>
    <rect x="152" y="140" width="52" height="28" rx="4" fill="#fb923c" opacity="0.28"/>
    <rect x="216" y="140" width="52" height="28" rx="4" fill="none" stroke="#fb923c" stroke-width="2.2"/>
    <!-- connector notch -->
    <path d="M320 138v10M320 158v12" stroke="#fb923c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="90" cy="154" r="5" fill="none" stroke="#8d7a61" stroke-width="2"/>
  </g>
  <!-- speed lines -->
  <g stroke="#fb923c" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M70 92h44M56 106h30M296 206h44M324 220h30"/>
  </g>
  <text x="200" y="272" font-family="Segoe UI, sans-serif" font-size="15" letter-spacing="6" fill="#8d7a61" text-anchor="middle">NVMe SSD</text>
</svg>
