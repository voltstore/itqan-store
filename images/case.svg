<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="صندوق كمبيوتر">
  <!-- Placeholder product art — replace with a real case photo later -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1d11"/><stop offset="1" stop-color="#43301b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g stroke="#45321e" stroke-width="1">
    <path d="M0 75h400M0 150h400M0 225h400M100 0v300M200 0v300M300 0v300"/>
  </g>
  <!-- tower -->
  <rect x="138" y="46" width="124" height="208" rx="12" fill="#332413" stroke="#8d7a61" stroke-width="2"/>
  <!-- tempered glass panel -->
  <rect x="152" y="60" width="96" height="150" rx="8" fill="url(#glass)" stroke="#fb923c" stroke-width="2"/>
  <path d="M162 196 236 74" stroke="#fb923c" stroke-width="1.5" opacity="0.4"/>
  <!-- internal fan glow -->
  <circle cx="200" cy="120" r="22" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.75"/>
  <circle cx="200" cy="168" r="14" fill="none" stroke="#fb923c" stroke-width="1.6" opacity="0.45"/>
  <!-- I/O + feet -->
  <path d="M166 228h44" stroke="#8d7a61" stroke-width="4" stroke-linecap="round"/>
  <circle cx="232" cy="228" r="5" fill="#fb923c"/>
  <path d="M150 254v10M250 254v10" stroke="#8d7a61" stroke-width="5" stroke-linecap="round"/>
  <text x="200" y="288" font-family="Segoe UI, sans-serif" font-size="15" letter-spacing="6" fill="#8d7a61" text-anchor="middle">CHASSIS</text>
